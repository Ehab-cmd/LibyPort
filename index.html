  <script>
    // تكوين Tailwind للتعرف على كلاس dark
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            cairo: ['Cairo', 'sans-serif'],
          },
        },
      },
    }

    // تطبيق الثيم المحفوظ فوراً قبل رندر الصفحة لمنع الوميض الأبيض
    const savedTheme = localStorage.getItem('libyport_theme');
    if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>

  <style>
    /* تحسينات CSS للوضع الليلي والنهاري */
    html {
      height: 100%;
      background-color: #f3f4f6;
    }
    html.dark {
      background-color: #111827;
    }
    body {
      font-family: 'Cairo', sans-serif;
      min-height: 100%;
      background-color: #f3f4f6;
    }
    .dark body {
      background-color: #111827;
    }
    #root {
      min-height: 100%;
      display: flex;
      flex-direction: column;
    }
    .hide-scrollbar::-webkit-scrollbar {
        display: none;
    }
    .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }
  </style>
