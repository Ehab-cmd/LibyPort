  <script>
    // تطبيق الثيم المحفوظ فوراً قبل رندر الصفحة لمنع الوميض الأبيض
    const savedTheme = localStorage.getItem('libyport_theme');
    if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>

  <style>
    /* Pre-loader styles */
    #pre-loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #ffffff; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 99999;
      transition: opacity 0.5s ease-out, visibility 0.5s;
    }
    .dark #pre-loader { background: #030712; }
    .pre-logo { width: 80px; height: 80px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.95); } }
    
    /* تحسينات CSS للوضع الليلي والنهاري */
    html {
      height: 100%;
      background-color: #f3f4f6;
    }
    html.dark {
      background-color: #111827;
    }
    body {
      font-family: 'Cairo', sans-serif;
      min-height: 100%;
      background-color: #f3f4f6;
    }
    .dark body {
      background-color: #111827;
    }
    #root {
      min-height: 100%;
      display: flex;
      flex-direction: column;
    }
    .hide-scrollbar::-webkit-scrollbar {
        display: none;
    }
    .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }
  </style>

<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-300">
  <div id="pre-loader">
    <img src="https://up6.cc/2025/10/176278012677161.jpg" alt="Loading..." class="pre-logo">
    <div style="margin-top: 20px; font-weight: 900; letter-spacing: 0.2em; color: #f59e0b;">LIBYPORT</div>
  </div>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
  <script>
    // إخفاء الـ pre-loader بعد تحميل الصفحة
    window.addEventListener('load', () => {
      const loader = document.getElementById('pre-loader');
      if (loader) {
        loader.style.opacity = '0';
        setTimeout(() => loader.style.visibility = 'hidden', 500);
      }
    });
  </script>
</body>
